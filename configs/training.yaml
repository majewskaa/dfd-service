data:
  # Paths to shard datasets
  shards_dir: "data/processed/FakeAVCeleb_v1.2/shards"
  train_index: "index_train.csv"
  val_index: "index_val.csv"
  
  # Data loading configuration
  batch_size: 16  # Mini-batch size for training
  num_workers: 1  # Number of data loading workers
  pin_memory: true
  frames_per_clip: 32 # Number of frames to sample per video clip
  
  normalization:
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]
  
  # Optional: limit samples for debugging
  max_train_samples: null  # Set to integer to limit training samples
  max_val_samples: null    # Set to integer to limit validation samples

model:
  # Model type - can be extended to support any BaseDetector subclass
  name: "XceptionMaxFusionDetector"  # Options: "XceptionMaxFusionDetector", "CNNLSTMDetector", "AVClassifier" or any other detector in src/models
  module_path: "src.models.xception"  # Python import path to model module: "xception", "cnn_lstm", "AVFF"
  num_classes: 2
  # encoder_checkpoint: "checkpoints/encoder/last-v1.ckpt"  # Path to pre-trained encoder checkpoint
  
  # Model-specific parameters (passed to __init__ as kwargs)
  model_params:
    pos_freq: 0.72
    embed_dim: 256          # Embedding dimension for encoders
    freeze_encoders: false  # Freeze encoders during training

training:
  epochs: 100
  grad_clip: 1.0
  
  early_stopping:
    patience: 10
    min_delta: 0.0001
  
  optimizer:
    name: "adam"
    learning_rate: 0.00003
    weight_decay: 0.0001
  
  scheduler:
    name: "cosine"
    min_lr: 0.000001

loss:
  name: "focal"
  focal_gamma: 3.0

logging:
  log_dir: "logs"
  wandb:
    project: "dfd-lab"
    offline: false

checkpointing:
  enabled: true
  dir: "checkpoints-snr10-finetune"
  monitor: "val_loss"
  mode: "min"
  resume_from: "checkpoints-base/last.ckpt"

# PyTorch Lightning Trainer specific flags
trainer:
  precision: "16-mixed" # Automatic Mixed Precision
  log_every_n_steps: 10
  accumulate_grad_batches: 16
  fast_dev_run: false

# Device configuration
device: "cuda"  # Options: "cuda", "cpu", "cuda:0", "cuda:1", etc.

# Seed for reproducibility
seed: 42