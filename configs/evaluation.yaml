data:
  # Paths to shard datasets
  shards_dir: "data/processed/Deepfake_Eval_2024/shards"
  test_index: "index_val.csv"
  
  # Data loading configuration
  batch_size: 32
  num_workers: 4
  pin_memory: true
  frames_per_clip: 32

model:
  # Model type
  name: "CNNLSTMDetector"
  module_path: "src.models.cnn_lstm"
  num_classes: 2
  model_params: { }

evaluation:
  checkpoint_path: "checkpoints/last-2511_1800.ckpt"
  device: "cuda"  # Options: "cuda", "cpu", "auto"
  limit_batches: null # Set to integer for debugging

  metrics:
    - "accuracy"
    - "f1_score"
    - "auc_roc"
    - "confusion_matrix"
  
  output_dir: "evaluation_results_deepfake_eval_2024"

loss:
  name: "cross_entropy"