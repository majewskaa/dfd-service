data:
  input_dir: "data/raw"
  output_dir: "data/processed"
  train_split: 0.8
  val_split: 0.2
  random_seed: 42

debug:
  limit_per_category: 500  # Set to null or -1 to disable

augmentations:
  enabled: false
  video:
    compression:
      enabled: false
      type: "jpeg" # "jpeg" or "h264"
      quality: 50  # for jpeg: 1-100
      crf: 30      # for h264: 0-51
    resolution:
      enabled: false
      scale_ratio: 0.5 # 0.0-1.0
  audio:
    compression:
      enabled: false
      format: "aac" # "mp3" or "aac"
      bitrate: "96k"
    noise:
      enabled: false
      snr_db: 10
  multimodal:
    av_desync:
      enabled: false
      min_shift_ms: -200
      max_shift_ms: 200

preprocessing:
  face_detection:
    min_face_size: 100
    margin: 0.2  # Margin around detected face as percentage of face size

  image_processing:
    target_size: [ 299, 299 ]  # 299 x 299 for exception
    normalization:
      mean: [ 0.485, 0.456, 0.406 ]  # ImageNet mean
      std: [ 0.229, 0.224, 0.225 ]   # ImageNet std

  audio_processing:
    enabled: true
    sample_rate: 16000
    n_mels: 64
    n_fft: 1024
    hop_length: 256
    mel_overlap_ratio: 0.1  # Overlap ratio for mel spectrograms (0.0-1.0)
    target_mel_size: [299, 299]  # Target size for resizing mel spectrograms (height, width)

output:
  # WebDataset configuration
  webdataset:
    prefix: "shard"
    overwrite: true
    max_shard_size_mb: 1024
    image_codec: "webp"     # "webp" or "jpeg"
    image_quality: 90        # 1-100
    index_filename: "index.csv"
    clip_length: 25
    clip_stride: 20